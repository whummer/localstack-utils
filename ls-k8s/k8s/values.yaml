replicaCount: 1

image:
  repository: localstack/localstack
  tag: "latest"
  pullPolicy: IfNotPresent

# Role + ServiceAccount give LocalStack permission to create/watch pods,
# which is required by the Kubernetes Lambda executor.
serviceAccount:
  create: true

role:
  create: true

service:
  type: NodePort
  edgeService:
    name: edge
    targetPort: 4566
    nodePort: 31566

# Use the Kubernetes executor so every Lambda invocation runs in its own pod.
lambdaExecutor: "kubernetes"

debug: false
