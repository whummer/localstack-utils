---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: localstack
  namespace: localstack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: localstack
  namespace: localstack
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: localstack
  namespace: localstack
subjects:
  - kind: ServiceAccount
    name: localstack
    namespace: localstack
roleRef:
  kind: Role
  name: localstack
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      serviceAccountName: localstack
      containers:
        - name: localstack
          image: localstack/localstack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4566
          env:
            - name: LAMBDA_RUNTIME_EXECUTOR
              value: kubernetes
            - name: LOCALSTACK_K8S_NAMESPACE
              value: localstack
            - name: LOCALSTACK_K8S_SERVICE_NAME
              value: localstack
            - name: LAMBDA_K8S_IMAGE_PREFIX
              value: localstack/lambda-
            - name: LOCALSTACK_DISABLE_EVENTS
              value: "1"
            - name: LOCALSTACK_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: localstack-auth
                  key: token
                  optional: true
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 24
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: localstack
spec:
  type: NodePort
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
      nodePort: 31566
