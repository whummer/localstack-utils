---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: localstack
  namespace: localstack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: localstack
  namespace: localstack
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: localstack
  namespace: localstack
subjects:
  - kind: ServiceAccount
    name: localstack
    namespace: localstack
roleRef:
  kind: Role
  name: localstack
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      serviceAccountName: localstack
      # Writes a kubeconfig pointing to kubernetes.default.svc so LocalStack's
      # k8s client doesn't fall back to localhost:80.
      # Uses certificate-authority file path (avoids base64 portability issues).
      initContainers:
        - name: gen-kubeconfig
          image: busybox
          command:
            - sh
            - -c
            - |
              set -e
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              cat > /kube/config <<EOF
              apiVersion: v1
              kind: Config
              clusters:
              - name: in-cluster
                cluster:
                  server: https://kubernetes.default.svc:443
                  certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              users:
              - name: localstack
                user:
                  token: ${TOKEN}
              contexts:
              - name: in-cluster
                context:
                  cluster: in-cluster
                  user: localstack
                  namespace: localstack
              current-context: in-cluster
              EOF
              echo "kubeconfig written:"
              cat /kube/config
          volumeMounts:
            - name: kubeconfig
              mountPath: /kube
      containers:
        - name: localstack
          image: localstack/localstack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4566
          env:
            - name: LAMBDA_RUNTIME_EXECUTOR
              value: kubernetes
            - name: LOCALSTACK_K8S_NAMESPACE
              value: localstack
            - name: LOCALSTACK_K8S_SERVICE_NAME
              value: localstack
            - name: KUBECONFIG
              value: /kube/config
            - name: LOCALSTACK_DISABLE_EVENTS
              value: "1"
            - name: LOCALSTACK_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: localstack-auth
                  key: token
                  optional: true
          volumeMounts:
            - name: kubeconfig
              mountPath: /kube
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 24
      volumes:
        - name: kubeconfig
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: localstack
spec:
  type: NodePort
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
      nodePort: 31566
